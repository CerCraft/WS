<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./popup.css" />
</head>
<body>
  <div class="scanline"></div>
  <div class="app">
    <header class="hud-header">
      <div class="hud-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>WEB SHIELD</span>
      </div>
      <div class="hud-status">
        <span class="dot"></span>
        <span>SCANNING</span>
      </div>
    </header>

    <div class="target">
      <span class="label">TARGET</span>
      <span class="value" id="domain">—</span>
    </div>

    <section class="stats">
      <div class="stat">
        <div class="stat-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="stat-num" id="count">0</div>
        <div class="stat-label">TRACKERS</div>
      </div>
      <div class="stat">
        <div class="stat-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </div>
        <div class="stat-num" id="links">0</div>
        <div class="stat-label">LINKS</div>
      </div>
      <div class="stat">
        <div class="stat-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="stat-num" id="time">0s</div>
        <div class="stat-label">UPTIME</div>
      </div>
    </section>

    <section class="graph-wrap">
      <div class="graph-header">
        <span>NETWORK MAP</span>
        <span class="graph-legend">
          <span class="lg-item"><span class="lg-dot lg-ads"></span>ADS</span>
          <span class="lg-item"><span class="lg-dot lg-analytics"></span>ANALYTICS</span>
          <span class="lg-item"><span class="lg-dot lg-social"></span>SOCIAL</span>
        </span>
      </div>
      <div id="graph"></div>
    </section>

    <section class="list">
      <div class="list-header">
        <span>DETECTED ENTITIES</span>
        <span class="list-count" id="list-count">0</span>
      </div>
      <ul id="trackers-list"></ul>
    </section>

    <footer class="hud-footer">
      <span>v1.0.0</span>
      <span>MANIFEST V3</span>
    </footer>
  </div>
  <script type="module" src="./popup.js"></script>
</body>
</html>
